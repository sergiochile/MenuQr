<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mundorum Viator - Carta</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --gold: #ffd700;
      --cyan: #44ffff;
      --green: #00ff88;
      --ink: #050505;
      --panel: #101010;
      --line: #2e2e2e;
    }

    body {
      min-height: 100vh;
      background: var(--ink);
      color: #fff;
      font-family: 'Press Start 2P', monospace;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      background:
        linear-gradient(90deg, rgba(255, 215, 0, 0.08) 1px, transparent 1px),
        linear-gradient(rgba(68, 255, 255, 0.06) 1px, transparent 1px),
        #000;
      background-size: 32px 32px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 16px;
      border-bottom: 3px solid var(--gold);
      background: rgba(0, 0, 0, 0.92);
      box-shadow: 0 0 22px rgba(255, 215, 0, 0.18);
    }

    h1 {
      color: var(--gold);
      font-size: clamp(13px, 3vw, 22px);
      line-height: 1.6;
      text-shadow: 2px 2px #8b0000;
      letter-spacing: 0;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    a {
      color: inherit;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 10px 12px;
      border: 2px solid var(--green);
      background: #000;
      color: var(--green);
      font-family: inherit;
      font-size: 8px;
      line-height: 1.4;
      text-decoration: none;
      cursor: pointer;
    }

    .btn:hover,
    .btn:focus-visible {
      background: var(--green);
      color: #000;
      outline: none;
    }

    main {
      min-height: 0;
      padding: 10px;
    }

    .pdf-frame {
      width: 100%;
      height: calc(100vh - 94px);
      min-height: 640px;
      display: block;
      border: 3px solid var(--cyan);
      background: #111;
      box-shadow: 0 0 22px rgba(68, 255, 255, 0.18);
    }

    .fallback {
      max-width: 680px;
      margin: 44px auto;
      padding: 24px;
      border: 3px solid var(--gold);
      background: var(--panel);
      text-align: center;
      line-height: 2.1;
    }

    .fallback p {
      margin-bottom: 18px;
      color: #d8d8d8;
      font-size: 10px;
    }

    @media (max-width: 680px) {
      header {
        align-items: stretch;
        flex-direction: column;
      }

      .actions {
        justify-content: stretch;
      }

      .btn {
        flex: 1;
        justify-content: center;
      }

      main {
        padding: 0;
      }

      .pdf-frame {
        height: calc(100vh - 136px);
        min-height: 520px;
        border-left: 0;
        border-right: 0;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <h1>MUNDORUM<br>VIATOR</h1>
      <div class="actions">
        <a class="btn" href="carta-suanzes-04-05-26.pdf" target="_blank" rel="noopener">ABRIR PDF</a>
        <a class="btn" href="carta-suanzes-04-05-26.pdf" download>DESCARGAR</a>
      </div>
    </header>

    <main>
      <object class="pdf-frame" data="carta-suanzes-04-05-26.pdf" type="application/pdf">
        <div class="fallback">
          <p>Tu navegador no puede mostrar el PDF integrado.</p>
          <a class="btn" href="carta-suanzes-04-05-26.pdf">ABRIR CARTA</a>
        </div>
      </object>
    </main>
  </div>
</body>
</html>
